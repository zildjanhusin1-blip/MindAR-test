<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Measurement (Zappar + Three.js)</title>
  <style>
    body{margin:0;overflow:hidden;font-family:system-ui}
    #hud{position:fixed;left:12px;top:12px;z-index:999;color:#111;background:rgba(255,255,255,0.9);padding:10px;border-radius:8px}
    #hud input{width:80px}
    #status{position:fixed;left:12px;bottom:12px;background:rgba(0,0,0,0.6);color:#fff;padding:8px;border-radius:6px}
  </style>
</head>
<body>
  <div id="hud">
    <div><strong>AR Measurement (image target)</strong></div>
    <div style="margin-top:6px">Target width (cm): <input id="targetWidth" value="21"/></div>
    <div style="margin-top:6px">
      <button id="btnInit">Init Tracking</button>
      <button id="btnPlace">Place point</button>
      <button id="btnUndo">Undo</button>
      <button id="btnClear">Clear</button>
      <button id="btnConfirm">Confirm</button>
    </div>
    <div style="margin-top:6px;font-size:12px;color:#444">Markerless mode: no image target required (Instant World Tracker)</div>
    <div style="margin-top:8px;font-size:12px;color:#444">
      <button id="btnCheckCam" onclick="checkCamera()">Check Camera</button>
      <button id="btnClearDebug">Clear Logs</button>
    </div>
    <div id="debug-box" style="margin-top:8px;max-width:320px;max-height:180px;overflow:auto;background:#f7f7f7;border:1px solid #ddd;padding:8px;border-radius:6px;font-size:12px;color:#333;display:none"></div>
  </div>
  <div id="status">Waiting for target...</div>
  <div id="error-box" style="position:fixed;right:12px;bottom:12px;z-index:10000;background:#ffe6e6;color:#600;padding:10px;border-radius:6px;display:none;max-width:360px;box-shadow:0 2px 6px rgba(0,0,0,0.2)"></div>

  <script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js';
import * as ZapparThree from 'https://cdn.jsdelivr.net/npm/@zappar/zappar-threejs@1.0.19/dist/zappar-threejs.module.js';

// No server-side PHP in this HTML version — static defaults
const productImg = "";
const productSize = null;

// Global error handlers to surface runtime problems on-screen
function showError(msg){
  console.error(msg);
  const el = document.getElementById('error-box');
  if(el){ el.textContent = typeof msg === 'string' ? msg : (msg && msg.message) || JSON.stringify(msg); el.style.display = 'block'; }
  const statusEl = document.getElementById('status'); if(statusEl) statusEl.textContent = 'Error: see details';
}
window.addEventListener('error', (e)=>{ showError(e.message || e.error || 'Unknown error'); });
window.addEventListener('unhandledrejection', (e)=>{ showError(e.reason || 'Unhandled promise rejection'); });

// Debug helpers
function debugLog(msg){
  const el = document.getElementById('debug-box');
  if(!el) return;
  el.style.display = 'block';
  const time = new Date().toLocaleTimeString();
  const row = document.createElement('div'); row.textContent = `[${time}] ${msg}`;
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
}
function clearDebug(){ const el=document.getElementById('debug-box'); if(el){ el.innerHTML=''; el.style.display='none'; } }

// small toast for visible feedback (useful on iOS when alerts/popups suppressed)
function showToast(msg, timeout=2500){
  let t = document.getElementById('__debug_toast');
  if(!t){ t = document.createElement('div'); t.id='__debug_toast'; t.style.position='fixed'; t.style.left='50%'; t.style.transform='translateX(-50%)'; t.style.bottom='90px'; t.style.padding='8px 12px'; t.style.background='rgba(0,0,0,0.8)'; t.style.color='#fff'; t.style.borderRadius='8px'; t.style.zIndex='10001'; t.style.fontSize='14px'; document.body.appendChild(t); }
  t.textContent = msg; t.style.display='block';
  clearTimeout(t._to); t._to = setTimeout(()=>{ t.style.display='none'; }, timeout);
}

// Unified camera check called by multiple event types
async function checkCamera(){
  try{ showToast('Camera check…'); }catch(e){}
  clearDebug(); debugLog('checkCamera invoked'); console.log('checkCamera invoked');
  try{ alert('Starting camera check — you should see a permission prompt'); }catch(e){}
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    debugLog('navigator.mediaDevices.getUserMedia NOT available');
    showToast('getUserMedia unavailable');
    return;
  }
  const btn = document.getElementById('btnCheckCam'); if(btn){ btn.disabled = true; btn.textContent = 'Checking…'; }
  try{
    const constraints = { video: { facingMode: 'environment' } };
    debugLog('requesting permission with constraints: ' + JSON.stringify(constraints));
    const s = await navigator.mediaDevices.getUserMedia(constraints);
    debugLog('getUserMedia OK — obtained stream with ' + s.getTracks().length + ' track(s)');
    showToast('Camera access granted');
    s.getTracks().forEach(t=>{ debugLog('stopping track: ' + t.kind); t.stop(); });
  }catch(err){
    debugLog('getUserMedia error: ' + (err && err.name) + ' — ' + (err && err.message));
    console.error(err);
    showToast('Camera access failed');
    // Fallback for devices/browsers that block getUserMedia: trigger file input capture
    try{
      debugLog('Attempting file-input capture fallback');
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'video/*,image/*';
      input.capture = 'environment';
      input.style.display = 'none';
      document.body.appendChild(input);
      input.addEventListener('change', ()=>{ debugLog('Fallback input change, files: ' + (input.files && input.files.length)); document.body.removeChild(input); showToast('Fallback input used'); });
      input.click();
    }catch(fbErr){ debugLog('Fallback failed: ' + (fbErr && fbErr.message)); console.error(fbErr); }
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = 'Check Camera'; }
  }
}


// Quick capability check
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
  showError('Camera API not available in this browser. Use a modern mobile browser or enable camera permissions.');
}

// Renderer + scene + Zappar camera
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new ZapparThree.Camera();
const scene = new THREE.Scene();

// Add a simple light so placed meshes look ok
const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
scene.add(light);

// Use Zappar Instant World Tracker (markerless)
let tracker = null;
try {
  tracker = new ZapparThree.InstantWorldTracker();
} catch (e) {
  console.warn('Failed to create InstantWorldTracker:', e);
}

// Anchor group that follows the instant world tracker (markerless)
let anchorGroup = new THREE.Group();
if (tracker) {
  anchorGroup = new ZapparThree.InstantWorldAnchorGroup(tracker, camera);
}
scene.add(anchorGroup);

// Start camera if available
try {
  debugLog && debugLog('calling camera.start()');
  if (camera && typeof camera.start === 'function') {
    try { camera.start(); debugLog('camera.start() succeeded'); } catch(e) { debugLog('camera.start() threw: ' + (e && e.message)); console.warn('camera.start failed', e); }
  } else {
    debugLog('camera.start() not available');
  }
} catch(e) { console.warn('camera.start failed', e); }

// helper plane (in anchor local space) used for raycasting
const planeGeo = new THREE.PlaneGeometry(1, 1);
const planeMat = new THREE.MeshBasicMaterial({ visible: false });
const anchorPlane = new THREE.Mesh(planeGeo, planeMat);
anchorPlane.rotation.x = -Math.PI / 2;
anchorGroup.add(anchorPlane);

// snapping tolerance (meters)
const SNAP_DISTANCE = 0.03; // 3 cm

// storage for points/lines/labels
const points = [];
const lines = [];
const labels = [];

const pointGeo = new THREE.SphereGeometry(0.01, 12, 12);
const pointMat = new THREE.MeshBasicMaterial({ color: 0xed8d1b });

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function screenToRaycaster(x, y){
  pointer.x = (x / window.innerWidth) * 2 - 1;
  pointer.y = -(y / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera.camera ? camera.camera : camera);
  return raycaster.intersectObject(anchorPlane, false);
}

function placePointFromScreen(x, y){
  const hits = screenToRaycaster(x, y);
  if (!hits.length) return false;
  const worldPoint = hits[0].point;
  const local = anchorGroup.worldToLocal(worldPoint.clone());
  // snap to nearby existing point if within SNAP_DISTANCE
  let snapTarget = null;
  for (let i = 0; i < points.length; i++) {
    const dist = local.distanceTo(points[i].position);
    if (dist < SNAP_DISTANCE && (snapTarget === null || dist < local.distanceTo(snapTarget.position))) {
      snapTarget = points[i];
    }
  }

  const p = new THREE.Mesh(pointGeo, pointMat.clone());
  if (snapTarget) {
    p.position.copy(snapTarget.position);
  } else {
    p.position.copy(local);
  }
  anchorGroup.add(p);
  points.push(p);

  if (points.length >= 2){
    const a = points[points.length-2].position.clone();
    const b = points[points.length-1].position.clone();
    const geometry = new THREE.BufferGeometry().setFromPoints([a,b]);
    const material = new THREE.LineBasicMaterial({ color:0x000000 });
    const line = new THREE.Line(geometry, material);
    anchorGroup.add(line);
    lines.push(line);

    const d = a.distanceTo(b);
    const label = makeLabel((d * getScaleFactor()).toFixed(2) + ' m');
    const mid = new THREE.Vector3().addVectors(a,b).multiplyScalar(0.5);
    label.position.copy(mid).add(new THREE.Vector3(0,0.02,0));
    anchorGroup.add(label);
    labels.push(label);
  }
  updateTilePreview();
  return true;
}

function makeLabel(text){
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const fontSize = 64;
  ctx.font = `${fontSize}px sans-serif`;
  const w = ctx.measureText(text).width + 40;
  canvas.width = w; canvas.height = fontSize + 20;
  ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = 'black'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text, canvas.width/2, canvas.height/2);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, depthTest:false });
  const spr = new THREE.Sprite(mat);
  spr.scale.set(0.12 * (canvas.width / canvas.height), 0.12, 1);
  spr.onBeforeRender = function(renderer, scene, camera){ spr.quaternion.copy(camera.quaternion); };
  return spr;
}

function getScaleFactor(){
  const cm = parseFloat(document.getElementById('targetWidth').value) || 1;
  return (cm/100);
}

function undo(){
  if (labels.length){ const l=labels.pop(); anchorGroup.remove(l); }
  if (lines.length){ const ln=lines.pop(); anchorGroup.remove(ln); }
  if (points.length){ const p=points.pop(); anchorGroup.remove(p); }
  updateTilePreview();
}
function clearAll(){ labels.splice(0).forEach(l=>anchorGroup.remove(l)); lines.splice(0).forEach(l=>anchorGroup.remove(l)); points.splice(0).forEach(p=>anchorGroup.remove(p)); updateTilePreview(); }

function calculateSizes(){
  if (points.length < 2) return {length:0,width:0};
  const edges = [];
  for (let i=0;i<points.length;i++){
    const a=points[i].position; const b=points[(i+1)%points.length].position;
    edges.push(a.distanceTo(b));
  }
  const unique=[]; const tol=0.01;
  edges.forEach(e=>{ if(!unique.some(u=>Math.abs(u-e)<tol)) unique.push(e); });
  unique.sort((a,b)=>b-a);
  return { length: (unique[0]||0)*getScaleFactor(), width:(unique[1]||0)*getScaleFactor() };
}

let tileMesh=null;
function updateTilePreview(){
  if (tileMesh){ anchorGroup.remove(tileMesh); tileMesh.geometry.dispose(); tileMesh.material.map.dispose(); tileMesh.material.dispose(); tileMesh=null; }
  if (points.length < 3) return;
  const verts = [];
  points.forEach(p=>verts.push(p.position.x,p.position.y,p.position.z));
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
  const indices=[]; for(let i=1;i<points.length-1;i++) indices.push(0,i,i+1);
  geometry.setIndex(indices); geometry.computeVertexNormals();
  const tex = new THREE.TextureLoader().load(productImg || 'noImage.png');
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(1,1);
  const mat = new THREE.MeshBasicMaterial({ map:tex, side:THREE.DoubleSide });
  tileMesh = new THREE.Mesh(geometry, mat);
  anchorGroup.add(tileMesh);
}

document.getElementById('btnPlace').addEventListener('click', ()=>{
  if (!placePointFromScreen(window.innerWidth/2, window.innerHeight/2)) alert('Target not visible or placement failed. Aim camera at the printed target and wait until detected.');
});
document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnClear').addEventListener('click', clearAll);
document.getElementById('btnInit').addEventListener('click', initTracking);

document.getElementById('btnCheckCam').addEventListener('click', async ()=>{
  clearDebug(); debugLog('Checking navigator.mediaDevices.getUserMedia...');
  try{ alert('Starting camera check — you should see a permission prompt'); }catch(e){}
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    debugLog('navigator.mediaDevices.getUserMedia NOT available');
    return;
  }
  try{
    const constraints = { video: { facingMode: 'environment' } };
    debugLog('requesting permission with constraints: ' + JSON.stringify(constraints));
    const s = await navigator.mediaDevices.getUserMedia(constraints);
    debugLog('getUserMedia OK — obtained stream with ' + s.getTracks().length + ' track(s)');
    s.getTracks().forEach(t=>{ debugLog('stopping track: ' + t.kind); t.stop(); });
  }catch(err){
    debugLog('getUserMedia error: ' + (err && err.name) + ' — ' + (err && err.message));
    console.error(err);
    // Fallback for devices/browsers that block getUserMedia: trigger file input capture
    try{
      debugLog('Attempting file-input capture fallback');
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'video/*,image/*';
      input.capture = 'environment';
      input.style.display = 'none';
      document.body.appendChild(input);
      input.addEventListener('change', ()=>{ debugLog('Fallback input change, files: ' + (input.files && input.files.length)); document.body.removeChild(input); });
      input.click();
    }catch(fbErr){ debugLog('Fallback failed: ' + (fbErr && fbErr.message)); console.error(fbErr); }
  }
});
document.getElementById('btnClearDebug').addEventListener('click', clearDebug);

function initTracking(){
  // Attempt to start camera and tracker and provide user feedback
  try { if (camera && typeof camera.start === 'function') camera.start(); } catch(e){ console.warn('camera.start failed', e); }
  try { if (tracker && typeof tracker.setAnchorPoseFromCameraOffset === 'function') {
      // try to set an initial anchor slightly in front of camera
      tracker.setAnchorPoseFromCameraOffset(0, 0, -1);
    }
  } catch(e) { /* non-fatal */ }
  statusEl.textContent = 'Initializing tracking — move device slowly';
  // small delay then update status
  setTimeout(()=>{ statusEl.textContent = anchorGroup.visible ? 'Tracking — place points' : 'Not tracking — move device to initialize tracking'; }, 1500);
}
function sendMeasurements(){
  if (points.length < 3) {
    alert('Please place at least 3 points to measure a surface.');
    return;
  }

  const { length, width } = calculateSizes();
  const lengthFixed = parseFloat(length.toFixed(2));
  const widthFixed = parseFloat(width.toFixed(2));

  const params = new URLSearchParams(location.search);
  const session = params.get('session');
  const product = params.get('product') || null;

  // POSTMESSAGE path
  try {
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({
        type: 'ar-measurement',
        length: lengthFixed,
        width: widthFixed,
        productId: product ? Number(product) : null,
        session: session || null
      }, '*');
      try { window.close(); } catch(e) {}
      return;
    }
  } catch (err) {
    console.warn('postMessage failed:', err);
  }

  // Redirect fallback if no session
  if (!session) {
    const redirectUrl = `ProductDetails.php?id=${encodeURIComponent(product)}&length=${encodeURIComponent(lengthFixed)}&width=${encodeURIComponent(widthFixed)}`;
    window.location.href = redirectUrl;
    return;
  }

  // Server POST fallback
  const endpoint = location.origin + '/ar-submit.php';
  fetch(endpoint, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ session: session, length: lengthFixed, width: widthFixed, productId: product ? Number(product) : null })
  }).then(r => r.json().catch(() => { throw new Error('Invalid JSON response'); }))
    .then(res => {
      if (res && res.status === 'ok') {
        try { alert('Measurements sent. Return to your PC.'); } catch(e){}
        try { window.close(); } catch(e) { document.body.innerHTML = '<div style="padding:20px;font-family:system-ui">Measurements sent. You may close this tab and return to your computer.</div>'; }
      } else {
        alert('Failed to send measurements: ' + (res && res.msg ? res.msg : 'unknown'));
      }
    }).catch(err => {
      console.error('POST failed', err);
      alert('Failed to send measurements. Check network and try again.');
    });
}

document.getElementById('btnConfirm').addEventListener('click', sendMeasurements);

window.addEventListener('pointerdown', (e)=>{ if (anchorGroup.visible) placePointFromScreen(e.clientX, e.clientY); });

// status updates based on anchor visibility
const statusEl = document.getElementById('status');
function updateStatus(){
  if (!tracker) { statusEl.textContent = 'Instant tracker not available in this browser/device'; return; }
  statusEl.textContent = anchorGroup.visible ? 'Tracking — place points' : 'Not tracking — move device to initialize tracking';
}

// Animation / render loop
function animate(){
  try { if (camera && typeof camera.updateFrame === 'function') camera.updateFrame(renderer); else if (camera && typeof camera.update === 'function') camera.update(); } catch(e) { console.warn('camera update error', e); }
  updateStatus();
  renderer.render(scene, camera.camera ? camera.camera : camera);
  requestAnimationFrame(animate);
}

animate();

// expose for debugging
window._zappar = { camera, tracker, anchorGroup };
  </script>
</body>
</html>
