<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebAR Measure</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:system-ui;
}

#ui{
position:fixed;
top:10px;
left:10px;
background:rgba(255,255,255,.9);
padding:10px;
border-radius:8px;
z-index:100;
}

#status{
position:fixed;
bottom:10px;
left:10px;
background:rgba(0,0,0,.7);
color:white;
padding:8px;
border-radius:6px;
}
</style>
</head>

<body>

<div id="ui">
<button id="start">Start AR</button>
<button id="clear">Clear</button>
</div>

<div id="status">Tap Start AR</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js";
import * as ZapparThree from "https://cdn.jsdelivr.net/npm/@zappar/zappar-threejs@1.0.19/dist/zappar-threejs.module.js";

ZapparThree.browserIncompatibleUI();
ZapparThree.permissionDeniedUI();

/* ---------- renderer ---------- */

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

ZapparThree.glContextSet(renderer.getContext());

/* ---------- scene ---------- */

const scene = new THREE.Scene();

/* ---------- camera ---------- */

const camera = new ZapparThree.Camera();
scene.add(camera);

/* ---------- light ---------- */

scene.add(new THREE.HemisphereLight(0xffffff,0xbbbbff,1));

/* ---------- tracker ---------- */

const tracker = new ZapparThree.InstantWorldTracker();
const anchorGroup = new ZapparThree.InstantWorldAnchorGroup(tracker,camera);

scene.add(anchorGroup);

/* ---------- raycasting plane ---------- */

const plane = new THREE.Mesh(
new THREE.PlaneGeometry(5,5),
new THREE.MeshBasicMaterial({visible:false})
);

plane.rotation.x = -Math.PI/2;
anchorGroup.add(plane);

/* ---------- measurement storage ---------- */

let points=[];
let lines=[];

/* ---------- create label ---------- */

function createLabel(text){

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=256;
canvas.height=128;

ctx.fillStyle="white";
ctx.fillRect(0,0,256,128);

ctx.fillStyle="black";
ctx.font="40px sans-serif";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(text,128,64);

const texture=new THREE.CanvasTexture(canvas);

const sprite=new THREE.Sprite(
new THREE.SpriteMaterial({map:texture})
);

sprite.scale.set(.25,.12,1);

return sprite;
}

/* ---------- place point ---------- */

function placePoint(x,y){

const mouse=new THREE.Vector2(
(x/window.innerWidth)*2-1,
-(y/window.innerHeight)*2+1
);

const raycaster=new THREE.Raycaster();

raycaster.setFromCamera(mouse,camera.camera);

const hit=raycaster.intersectObject(plane);

if(!hit.length) return;

const local=anchorGroup.worldToLocal(hit[0].point.clone());

const sphere=new THREE.Mesh(
new THREE.SphereGeometry(.02,16,16),
new THREE.MeshBasicMaterial({color:0xff7a00})
);

sphere.position.copy(local);

anchorGroup.add(sphere);

points.push(sphere);

/* ----- draw line ----- */

if(points.length>=2){

const a=points[points.length-2].position;
const b=points[points.length-1].position;

const geometry=new THREE.BufferGeometry().setFromPoints([a,b]);

const line=new THREE.Line(
geometry,
new THREE.LineBasicMaterial({color:0x000000})
);

anchorGroup.add(line);

lines.push(line);

/* ----- distance ----- */

const dist=a.distanceTo(b);

const label=createLabel(dist.toFixed(2)+" m");

const mid=new THREE.Vector3().addVectors(a,b).multiplyScalar(.5);

label.position.copy(mid);

anchorGroup.add(label);

}

}

/* ---------- pointer tap ---------- */

window.addEventListener("pointerdown",(e)=>{

if(anchorGroup.visible)
placePoint(e.clientX,e.clientY);

});

/* ---------- start AR ---------- */

document.getElementById("start").onclick=()=>{

ZapparThree.permissionRequestUI().then(granted=>{

if(!granted) return;

camera.start();

tracker.setAnchorPoseFromCameraOffset(0,0,-1);

document.getElementById("status").textContent=
"Move phone slowly, tap to measure";

});

};

/* ---------- clear ---------- */

document.getElementById("clear").onclick=()=>{

points.forEach(p=>anchorGroup.remove(p));
lines.forEach(l=>anchorGroup.remove(l));

points=[];
lines=[];

};

/* ---------- render loop ---------- */

function animate(){

camera.updateFrame(renderer);

renderer.render(scene,camera.camera);

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
